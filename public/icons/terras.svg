  <rect x="30" y="32" width="20" height="20" rx="2" stroke="white" stroke-width="2.5" fill="none"/>
  <rect x="8" y="10" width="20" height="20" rx="2" stroke="white" stroke-width="2.5" fill="none"/>
  <rect x="30" y="10" width="20" height="20" rx="2" stroke="white" stroke-width="2.5" fill="none"/>
