  <line x1="43" y1="12" x2="41" y2="18" stroke="#ADE6E6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="12" x2="46" y2="19" stroke="#ADE6E6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="49" y1="12" x2="51" y2="18" stroke="#ADE6E6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="12" x2="56" y2="17" stroke="#ADE6E6" stroke-width="1.5" stroke-linecap="round"/>
</svg>
